<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
        }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .container {
            display: flex;
            flex: 1;
        }

        /* Sidebar Navigation */
        nav {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 2px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-color);
            padding: 15px 25px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        nav button:hover, nav button.active {
            background-color: #2c2c2c;
            border-left: 4px solid var(--accent);
            color: var(--accent);
        }

        /* Main Game Area */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #0a0a0a;
        }

        .game-section {
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-section.active {
            display: flex;
        }

        .game-title {
            margin-top: 0;
            color: var(--accent);
        }

        .controls {
            margin-top: 15px;
            text-align: center;
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        /* Snake Specifics */
        #snake-board {
            border: 2px solid #333;
            background-color: #000;
        }

        /* Tic Tac Toe Specifics */
        .ttt-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background-color: #333;
            padding: 5px;
            border-radius: 8px;
        }

        .ttt-cell {
            background-color: var(--panel-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .ttt-cell:hover {
            background-color: #2c2c2c;
        }
        
        .ttt-status {
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <header>
        <h1>Unblocked Games Hub</h1>
    </header>

    <div class="container">
        <nav>
            <button class="nav-btn active" onclick="switchGame('snake', this)">Classic Snake</button>
            <button class="nav-btn" onclick="switchGame('tictactoe', this)">Tic Tac Toe</button>
        </nav>

        <main>
            <!-- Snake Game -->
            <div id="snake" class="game-section active">
                <h2 class="game-title">Snake</h2>
                <div style="margin-bottom: 10px;">Score: <span id="snake-score">0</span></div>
                <canvas id="snake-board" width="400" height="400"></canvas>
                <div class="controls">
                    <p style="font-size: 12px; color: #888;">Use Arrow Keys to play.</p>
                    <button class="btn" onclick="startSnake()">Start / Restart Game</button>
                </div>
            </div>

            <!-- Tic Tac Toe Game -->
            <div id="tictactoe" class="game-section">
                <h2 class="game-title">Tic Tac Toe</h2>
                <div class="ttt-status" id="ttt-status">Player X's Turn</div>
                <div class="ttt-board" id="ttt-board">
                    <div class="ttt-cell" data-index="0"></div>
                    <div class="ttt-cell" data-index="1"></div>
                    <div class="ttt-cell" data-index="2"></div>
                    <div class="ttt-cell" data-index="3"></div>
                    <div class="ttt-cell" data-index="4"></div>
                    <div class="ttt-cell" data-index="5"></div>
                    <div class="ttt-cell" data-index="6"></div>
                    <div class="ttt-cell" data-index="7"></div>
                    <div class="ttt-cell" data-index="8"></div>
                </div>
                <div class="controls">
                    <button class="btn" onclick="resetTTT()">Restart Game</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Navigation Logic ---
        function switchGame(gameId, btnElement) {
            // Stop Snake game loop if running
            clearTimeout(snakeLoop);
            
            // Hide all games
            document.querySelectorAll('.game-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected game
            document.getElementById(gameId).classList.add('active');
            btnElement.classList.add('active');
        }


        // --- Snake Game Logic ---
        const canvas = document.getElementById('snake-board');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let snake = [];
        let food = {};
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let snakeLoop;
        let changingDirection = false;

        function startSnake() {
            clearTimeout(snakeLoop);
            snake = [
                {x: 200, y: 200},
                {x: 180, y: 200},
                {x: 160, y: 200}
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            document.getElementById('snake-score').innerText = score;
            spawnFood();
            mainSnake();
        }

        function mainSnake() {
            if (hasGameEnded()) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText("Game Over!", 120, 200);
                return;
            }
            changingDirection = false;
            snakeLoop = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                mainSnake();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach(part => {
                ctx.fillStyle = 'lightgreen';
                ctx.strokeStyle = 'darkgreen';
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('snake-score').innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
        }

        function spawnFood() {
            food.x = Math.round((Math.random() * (canvas.width - gridSize)) / gridSize) * gridSize;
            food.y = Math.round((Math.random() * (canvas.height - gridSize)) / gridSize) * gridSize;
            // Check if food spawns on snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) spawnFood();
            });
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || 
                   snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        document.addEventListener("keydown", (e) => {
            if(document.getElementById('snake').classList.contains('active')) {
                // Prevent scrolling with arrows
                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.code) > -1) {
                    e.preventDefault();
                }
                
                if (changingDirection) return;
                const goingUp = dy === -gridSize;
                const goingDown = dy === gridSize;
                const goingRight = dx === gridSize;
                const goingLeft = dx === -gridSize;

                if (e.key === "ArrowLeft" && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
                if (e.key === "ArrowUp" && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
                if (e.key === "ArrowRight" && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
                if (e.key === "ArrowDown" && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
            }
        });

        // Initialize snake board visually
        clearCanvas();
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Press Start to Play", 115, 200);


        // --- Tic Tac Toe Logic ---
        const tttCells = document.querySelectorAll('.ttt-cell');
        const tttStatus = document.getElementById('ttt-status');
        let tttBoard = ["", "", "", "", "", "", "", "", ""];
        let tttCurrentPlayer = "X";
        let tttActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        tttCells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (tttBoard[index] !== "" || !tttActive) return;

            tttBoard[index] = tttCurrentPlayer;
            cell.innerText = tttCurrentPlayer;
            cell.style.color = tttCurrentPlayer === 'X' ? '#bb86fc' : '#03dac6';

            checkWin();
        }

        function checkWin() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (tttBoard[a] && tttBoard[a] === tttBoard[b] && tttBoard[a] === tttBoard[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                tttStatus.innerText = `Player ${tttCurrentPlayer} Wins!`;
                tttActive = false;
                return;
            }

            if (!tttBoard.includes("")) {
                tttStatus.innerText = "Game ended in a draw!";
                tttActive = false;
                return;
            }

            tttCurrentPlayer = tttCurrentPlayer === "X" ? "O" : "X";
            tttStatus.innerText = `Player ${tttCurrentPlayer}'s Turn`;
        }

        function resetTTT() {
            tttBoard = ["", "", "", "", "", "", "", "", ""];
            tttCurrentPlayer = "X";
            tttActive = true;
            tttStatus.innerText = "Player X's Turn";
            tttCells.forEach(cell => {
                cell.innerText = "";
            });
        }

    </script>
</body>
</html>
