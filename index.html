<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom - Guest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <button class="icon-btn"><span class="material-symbols-rounded">menu</span></button>
            <img src="https://www.gstatic.com/images/branding/googlelogo/svg/googlelogo_clr_74x24dp.svg" alt="Google">
            <span class="product-name">Classroom</span>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="join-btn" title="Create or join a class">
                <span class="material-symbols-rounded">add</span>
            </button>
            <button class="icon-btn"><span class="material-symbols-rounded">apps</span></button>
            <div class="profile-circle guest">?</div>
        </div>
    </header>

    <main class="main-container">
        <div class="empty-state">
            <img src="https://www.gstatic.com/classroom/web/modules/home/no_classes.png" alt="No classes" class="empty-img">
            <h2>Don't see your existing classes?</h2>
            <p>Try signing in with another account or join a class using a code.</p>
            <button class="action-btn" id="secondary-join-btn">Join class</button>
        </div>
    </main>

    <div class="modal-overlay" id="join-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Join class</h3>
                <button class="icon-btn" id="close-modal"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body">
                <p class="modal-instruction">Ask your teacher for the class code, then enter it here.</p>
                <div class="input-container">
                    <input type="text" id="class-code-input" placeholder="Class code" autocomplete="off">
                    <span class="error-msg" id="error-message">Invalid code. Try again.</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="text-btn" id="cancel-btn">Cancel</button>
                <button class="submit-btn" id="submit-code-btn" disabled>Join</button>
            </div>
        </div>
    </div>

    <script>
        const joinBtn = document.getElementById('join-btn');
        const secondaryJoinBtn = document.getElementById('secondary-join-btn');
        const modal = document.getElementById('join-modal');
        const closeModal = document.getElementById('close-modal');
        const cancelBtn = document.getElementById('cancel-btn');
        const submitBtn = document.getElementById('submit-code-btn');
        const codeInput = document.getElementById('class-code-input');
        const errorMsg = document.getElementById('error-message');

        // Open Modal
        function openModal() {
            modal.style.display = 'flex';
            codeInput.focus();
        }

        // Close Modal
        function hideModal() {
            modal.style.display = 'none';
            codeInput.value = '';
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
        }

        joinBtn.addEventListener('click', openModal);
        secondaryJoinBtn.addEventListener('click', openModal);
        closeModal.addEventListener('click', hideModal);
        cancelBtn.addEventListener('click', hideModal);

        // Enable/Disable Join button based on typing
        codeInput.addEventListener('input', () => {
            if (codeInput.value.trim().length > 0) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        });

        // Code verification logic
        submitBtn.addEventListener('click', () => {
            if (codeInput.value.trim() === "1111") {
                window.location.href = "home.html";
            } else {
                errorMsg.style.display = 'block';
                codeInput.value = '';
                submitBtn.disabled = true;
            }
        });

        // Allow pressing Enter key to submit
        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
