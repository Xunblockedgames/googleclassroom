<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom Replica</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="nav-left">
            <button class="icon-btn"><span class="material-symbols-rounded">menu</span></button>
            <img src="https://www.gstatic.com/images/branding/googlelogo/svg/googlelogo_clr_74x24dp.svg" alt="Google">
            <span class="product-name">Classroom</span>
        </div>
        <div class="nav-right">
            <button class="icon-btn"><span class="material-symbols-rounded">add</span></button>
            <button class="icon-btn"><span class="material-symbols-rounded">apps</span></button>
            <div class="profile-circle">J</div>
        </div>
    </header>

    <div class="main-container">
        <!-- Main Feed -->
        <main class="content">
            <div class="class-grid">
                
                <!-- Class Card 1 -->
                <div class="class-card">
                    <div class="card-header math-bg">
                        <div class="header-top">
                            <a href="#" class="class-title">Advanced Calculus - Period 4</a>
                            <button class="icon-btn-white"><span class="material-symbols-rounded">more_vert</span></button>
                        </div>
                        <p class="class-teacher">Mr. Henderson</p>
                    </div>
                    <div class="card-body">
                        <p class="due-soon">Due tomorrow</p>
                        <p class="assignment-link">Problem Set #12: Integrals</p>
                    </div>
                    <div class="card-footer">
                        <button class="icon-btn"><span class="material-symbols-rounded">folder</span></button>
                        <button class="icon-btn"><span class="material-symbols-rounded">assignment_ind</span></button>
                    </div>
                </div>

                <!-- Class Card 2 -->
                <div class="class-card">
                    <div class="card-header history-bg">
                        <div class="header-top">
                            <a href="#" class="class-title">Modern World History</a>
                            <button class="icon-btn-white"><span class="material-symbols-rounded">more_vert</span></button>
                        </div>
                        <p class="class-teacher">Ms. Robinson</p>
                    </div>
                    <div class="card-body">
                        <p class="no-work">No work due soon</p>
                    </div>
                    <div class="card-footer">
                        <button class="icon-btn"><span class="material-symbols-rounded">folder</span></button>
                        <button class="icon-btn"><span class="material-symbols-rounded">assignment_ind</span></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
